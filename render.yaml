services:
  - type: web
    name: transit-alert
    runtime: node
    plan: free
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm build
    startCommand: node server/render-server.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: transit-alert-db
          property: connectionString
databases:
  - name: transit-alert-db
    plan: free
    databaseName: transitalert
    user: transitalert
