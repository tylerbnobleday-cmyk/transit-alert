kind = "web"
previewPath = "/"
title = "Transit Alert - Melbourne"
version = "1.0.0"
id = "artifacts/transit-alert"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23338

[services.development]
run = "pnpm --filter @workspace/transit-alert run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transit-alert", "run", "build" ]
publicDir = "artifacts/transit-alert/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23338"
BASE_PATH = "/"
